<!DOCTYPE html>
 <html>
 <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <title>Register Page</title>
    <link rel="stylesheet" href="tampilanregister.css" media="screen" title="no title">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
	<script type = "text/javascript" src = "https://code.jquery.com/jquery-2.1.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
	
	<script>
       $(document).ready(function() {
          $('select').material_select();
       });
    </script>
</head>

<body>
	<header>
		<img src="image/logo.png" alt="Logo">
	</header>
	
	<div class="register-form-container" id="register-form">
		<div class="register-form-content">
			<div class="register-form-header">
				<div class="logo">
					<img src="image/icon.png"/>
				</div>
				<h3>Register Form</h3>
			</div>
			
			<form method="post" action="" class="register-form">
				<div class="input-container">
					<i class="fa fa-user"></i>
					Full Name: <input type="text" class="input" name="name" placeholder="Full Name"/>
				</div>
			
				<div class="input-container">
					<i class="fa fa-vcard"></i>
					NIK: <input type="text" class="input" name="nik" placeholder="NIK"/>
				</div>
				
				<div class="input-container">
					<i class="fa fa-circle-o"></i>
					Username: <input type="text" class="input" name="username" placeholder="Username"/>
				</div>
				
				<div class="input-container">
					<i class="fa fa-users"></i>
					Member Type:
					 <p>
						<label>
							<input name="group1" type="radio" checked />
							<span>Civilian</span>
						</label>
					</p>
					
					<p>
						<label>
							<input name="group1" type="radio" checked />
							<span>Guild Member</span>
						</label>
					</p>
				</div>
				
				<div class="input-container">
					<i class="fa fa-clock-o"></i>
					Join Period:
					<div class="row">
						<label>Materialize Select</label>
							<select>
								<option value="" disabled selected>Choose your option</option>
								<option value="1">1 Month</option>
								<option value="2">3 Month</option>
								<option value="3">6 Month</option>
								<option value="4">1 Year</option>
							</select>
					</div?
				</div>
				
				<div class="input-container">
					<i class="fa fa-briefcase"></i>
					Profession: <input type="text" class="input" name="profesi" placeholder="Profesi"/>
				</div>
				
				<div class="input-container">
					<i class="fa fa-shield"></i>
					Skill Set:
					<div class="row">
						<label>Materialize Multiple Select</label>
							<select multiple>
								<option value="" disabled selected>Choose your option</option>
								<option value="1">1. Sword Skills</option>
								<option value="2">2. Axe Skills</option>
								<option value="3">3. Bow Skills</option>
								<option value="4">4. Wand Skills</option>
								<option value="5">5. Book Skills</option>
								<option value="6">6. Healing Skills</option>>
							</select>
					</div>
				</div>
			
				<div class="input-container">
					<i class="fa fa-envelope"></i>
					Email: <input type="email" class="input" name="email" placeholder="Email"/>
				</div>
				
				<div class="input-container">
					<i class="fa fa-lock"></i>
					Password: <input type="password"  id="login-password" class="input" name="password" placeholder="Password"/>
				</div>
				
				<div class="input-container">
					<i class="fa fa-calendar"></i>
					Birth Date: <input type="date" name="tanggal" />
				</div>
				
				<div class="input-container">
					<i class="fa fa-map-marker"></i>
					Adress: <textarea name="adress"></textarea>
				</div>
			
			
				<input type="submit" name="create-account" value="Create Account" class="button"/>
		
			</form>
			
			<div class="login">
				<a href="login.html" class='btn'>
					<span>Back to Login</span>
				</a>
			</div>
			
			
			<div class="separator">
					<span class="separator-text">OR</span>
			</div>
			
			<div class="sosmed-register">
				<a href="https://accounts.google.com/signin/v2/identifier?flowName=GlifWebSignIn&flowEntry=ServiceLogin" class="sosmed-btn-google-btn">
					<i class="fa fa-google"></i>
					<span>Register with Google Account</span>
				</a>
			
				<a href="https://www.facebook.com/login/device-based/regular/login/?login_attempt=1&lwv=110" class="sosmed-btn-facebook-btn">
					<i class="fa fa-facebook"></i>
					<span>Register with Facebook Account</span>
				</a>
				
				<a href="https://api.twitter.com/oauth/authenticate?" class="sosmed-btn-twitter-btn">
					<i class="fa fa-twitter"></i>
					<span>Register with Twitter Account</span>
				</a>
				
				<a href="https://github.com/" class="sosmed-btn-github-btn">
					<i class="fa fa-github"></i>
					<span>Register with Github Account</span>
				</a>
				
			</div>
		</div>
	</div>
	
 </body>
 </html>
