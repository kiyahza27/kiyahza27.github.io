<!DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <title>Login Page</title>
    <link rel="stylesheet" href="tampilanlogin.css" media="screen" title="no title">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
	<script type = "text/javascript" src = "https://code.jquery.com/jquery-2.1.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
	
	<header>
		<img src="image/logo.png" alt="Logo">
	</header>
	
	<!--LOGIN FORM-->
	<div class="login-form-container" id="login-form">
		<div class="login-form-content">
			<div class="login-form-header">
				<div class="logo">
					<img src="image/icon.png"/>
				</div>
				<h3>Login Form</h3>
			</div>
			
			<form method="post" action="" class="login-form">
				<div class="input-container">
				<i class="fa fa-envelope"></i>
					Email: <input type="email" class="input" name="email" placeholder="Email"/>
				</div>
				
				<div class="input-container">
				<i class="fa fa-lock"></i>
					Password: <input type="password"  id="login-password" class="input" name="password" placeholder="Password"/>
				</div>
				
				<div class="rememberme-container">
					Remember Me:
					 <p>
						<label>
							<input type="checkbox" />
							<span>Remember Me</span> 
						</label>
					</p>
					<a class="forgot-password" href="#">Forgot Password?</a>
				</div>
			
				<input type="submit" name="login" value="Login" class="button"/>
				<input type="submit" name="loginas" value="Login As Guest" class="buttonloginas"/>
				<a href="register.html" class="register">Register</a>
			</form>
			
		</div>
	</div>
	
 </head>
 </html>
